<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For My Love ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: #333;
    }
    h1 {
      margin-top: 40px;
      font-size: 3rem;
    }
    p {
      font-size: 1.2rem;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }
    .gallery img {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <h1>Hi Neha ❤️</h1>
  <p>This isn’t just a website.
It’s a quiet place where my feelings live—built one line at a time, just like the way you slowly became my favorite part of everything.</p>

  <div class="gallery">
    <img src="https://picsum.photos/500/400?1">
    <img src="https://picsum.photos/500/400?2">
    <img src="https://picsum.photos/500/400?3">
  </div>

</body>
</html>
